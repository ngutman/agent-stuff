name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  package-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate package metadata
        run: node -e "const pkg=require('./package.json'); if(!pkg.pi?.extensions?.length){throw new Error('pi.extensions is required')}"

      - name: npm pack dry run
        run: npm pack --dry-run
